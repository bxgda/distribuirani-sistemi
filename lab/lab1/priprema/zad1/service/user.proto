syntax = "proto3";

option csharp_namespace = "Zad1_Service";

package user;

service UserService 
{
	rpc CreateUser(User) returns (User);
	rpc GetUser(UserId) returns (User);
	rpc UpdateUser(User) returns (User);
	rpc DeleteUser(UserId) returns (Empty);

	rpc GetUsersInRange(IdRangeRequest) returns (UserList);
	rpc DeleteMany(DeleteManyRequest) returns (DeleteManyResponse);
}

message User
{
	int32 id = 1;
	string firstName = 2;
	string lastName = 3;
	string address = 4;
	repeated string phone = 5;
}

message UserId
{
	int32 id = 1;
}

message Empty {}

message UserList 
{
	repeated User users = 1;
}

message IdRangeRequest
{
	int32 startId = 1;
	int32 endId = 2;
}

message DeleteResult
{
	int32 id = 1;
	string message = 2;
}

message DeleteManyRequest
{
	repeated int32 ids = 1;
}

message DeleteManyResponse
{
	repeated DeleteResult results = 1;
}
