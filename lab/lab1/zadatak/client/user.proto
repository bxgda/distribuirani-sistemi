syntax = "proto3";

option csharp_namespace = "Zad1_Client";

package calc;

message NumberRequest {
  int32 value = 1;
}

message NumberResponse {
  int32 value = 1;
}

message Empty {}

service CalcService {
  rpc UpdateAcc (NumberRequest) returns (Empty);
  rpc ProcessStream(stream NumberRequest) returns (stream NumberResponse);
}
